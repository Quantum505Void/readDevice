<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22">
  <!-- Chip body -->
  <rect x="5" y="5" width="12" height="12" rx="2" fill="#4f46e5"/>
  <rect x="7" y="7" width="8" height="8" rx="1" fill="#0d0d12"/>
  <!-- Center die glow -->
  <rect x="8.5" y="8.5" width="5" height="5" rx="0.8" fill="#6366f1" opacity="0.7"/>
  <rect x="10" y="10" width="2" height="2" rx="0.4" fill="#e0e7ff"/>
  <!-- Left pins -->
  <rect x="2" y="7.5" width="3" height="1.5" rx="0.5" fill="#818cf8"/>
  <rect x="2" y="10.5" width="3" height="1.5" rx="0.5" fill="#818cf8"/>
  <rect x="2" y="13" width="3" height="1.5" rx="0.5" fill="#818cf8"/>
  <!-- Right pins -->
  <rect x="17" y="7.5" width="3" height="1.5" rx="0.5" fill="#818cf8"/>
  <rect x="17" y="10.5" width="3" height="1.5" rx="0.5" fill="#818cf8"/>
  <rect x="17" y="13" width="3" height="1.5" rx="0.5" fill="#818cf8"/>
  <!-- Top pins -->
  <rect x="7.5" y="2" width="1.5" height="3" rx="0.5" fill="#818cf8"/>
  <rect x="10.5" y="2" width="1.5" height="3" rx="0.5" fill="#818cf8"/>
  <rect x="13" y="2" width="1.5" height="3" rx="0.5" fill="#818cf8"/>
  <!-- Bottom pins -->
  <rect x="7.5" y="17" width="1.5" height="3" rx="0.5" fill="#818cf8"/>
  <rect x="10.5" y="17" width="1.5" height="3" rx="0.5" fill="#818cf8"/>
  <rect x="13" y="17" width="1.5" height="3" rx="0.5" fill="#818cf8"/>
</svg>
